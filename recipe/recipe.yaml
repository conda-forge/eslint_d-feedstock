context:
  version: "15.0.2"

package:
  name: eslint_d
  version: ${{ version }}

source:
  url: https://registry.npmjs.org/eslint_d/-/eslint_d-${{ version }}.tgz
  sha256: b329300563f43d3bc3ed8b58e7341c85d670f806a719182a029e308966a1c6e3

build:
  number: 0
  noarch: generic

requirements:
  build:
    - jq
    - nodejs
    - pnpm
    - pnpm-licenses
  run:
    - nodejs

tests:
  - script:
      - eslint_d --help

about:
  license: MIT
  license_file:
    - LICENSE
    - third-party-licenses.txt
  summary: Speed up eslint to accelerate your development workflow
  homepage: https://github.com/mantoni/eslint_d.js
  repository: https://github.com/mantoni/eslint_d.js

extra:
  recipe-maintainers:
    - danielnachun
