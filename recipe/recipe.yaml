context:
  version: "15.0.0"

package:
  name: eslint_d
  version: ${{ version }}

source:
  url: https://registry.npmjs.org/eslint_d/-/eslint_d-${{ version }}.tgz
  sha256: 5c1e91bb55b598491108cd80ab94c6524a51c9a7ac4a117f60ea445a6633c208

build:
  number: 0
  noarch: generic

requirements:
  build:
    - jq
    - nodejs
    - pnpm
    - pnpm-licenses
  run:
    - nodejs

tests:
  - script:
      - eslint_d --help

about:
  license: MIT
  license_file:
    - LICENSE
    - third-party-licenses.txt
  summary: Speed up eslint to accelerate your development workflow
  homepage: https://github.com/mantoni/eslint_d.js
  repository: https://github.com/mantoni/eslint_d.js

extra:
  recipe-maintainers:
    - danielnachun
